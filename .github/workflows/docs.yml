name: Docs
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'docs/**'
      - 'scripts/extract-api/**'
      - 'pom.xml'
      - 'CHANGELOG.md'
      - 'MIGRATION.md'
      - 'LICENSE'
      - '.github/workflows/docs.yml'
  release: { types: [published] }
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # The Java extractor (scripts/extract-api/main.ts) does not actually
      # invoke javadoc — it reads pom.xml for the version and emits MDX from
      # a hand-maintained method list plus the runnable examples/ files. We
      # still set up Java so a future Doclet- or JavaParser-based extractor
      # can be dropped in without a workflow change.
      - uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install docs deps
        working-directory: docs
        run: npm ci || npm install --no-audit --no-fund
      - name: Build docs site (extract + astro build)
        working-directory: docs
        run: npm run build
      - name: Verify index exists
        run: test -s docs/dist/index.html
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
