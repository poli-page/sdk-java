name: Docs
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'docs/**'
      - 'scripts/extract-api/**'
      - 'pom.xml'
      - 'CHANGELOG.md'
      - 'MIGRATION.md'
      - 'LICENSE'
      - '.github/workflows/docs.yml'
  release: { types: [published] }
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # The Java extractor (scripts/extract-api/main.ts) does not actually
      # invoke javadoc — it reads pom.xml for the version and emits MDX from
      # a hand-maintained method list plus the runnable examples/ files. We
      # still set up Java so a future Doclet- or JavaParser-based extractor
      # can be dropped in without a workflow change.
      - uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
      - name: Install docs deps
        working-directory: docs
        run: npm ci || npm install --no-audit --no-fund
      - name: Build docs site (extract + astro build)
        working-directory: docs
        run: npm run build
      - name: Verify index exists
        run: test -s docs/dist/index.html
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/dist

  # Deploy is disabled while the repo is private — the org's plan does not
  # support GitHub Pages on private repos (POST /repos/.../pages returns 422
  # "Your current plan does not support GitHub Pages for this repository").
  # Build still runs so docs breakage is caught at PR time. Uncomment once the
  # repo is public (or a Pages-eligible plan is in place).
  #
  # deploy:
  #   needs: build
  #   runs-on: ubuntu-latest
  #   environment:
  #     name: github-pages
  #     url: ${{ steps.deployment.outputs.page_url }}
  #   steps:
  #     - id: deployment
  #       uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
