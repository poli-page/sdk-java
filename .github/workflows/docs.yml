name: Docs
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'docs/**'
      - 'scripts/extract-api/**'
      - 'pom.xml'
      - 'CHANGELOG.md'
      - 'MIGRATION.md'
      - 'LICENSE'
      - '.github/workflows/docs.yml'
  release: { types: [published] }
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # The Java extractor (scripts/extract-api/main.ts) does not actually
      # invoke javadoc — it reads pom.xml for the version and emits MDX from
      # a hand-maintained method list plus the runnable examples/ files. We
      # still set up Java so a future Doclet- or JavaParser-based extractor
      # can be dropped in without a workflow change.
      - uses: actions/setup-java@7a445ee0b6cfb8f3f9d59c6e7a55f8d2f3a4e2c8 # v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
      - name: Install docs deps
        working-directory: docs
        run: npm ci || npm install --no-audit --no-fund
      - name: Build docs site (extract + astro build)
        working-directory: docs
        run: npm run build
      - name: Verify index exists
        run: test -s docs/dist/index.html
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90ba9d3a1c8d5b6b1e2b6e5b88aaa3c2e8bb # v4.0.5
