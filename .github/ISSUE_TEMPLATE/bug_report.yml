name: Bug report
description: Something in the Poli Page Java SDK doesn't behave as documented.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much as you can — the
        more we have to reproduce the issue, the faster we can fix it.

  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      description: The `page.poli:sdk` version you depend on (e.g. `1.0.0`).
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java version
      description: Output of `java -version` (the implementation, not just the major version).
      placeholder: "Temurin 21.0.4"
    validations:
      required: true

  - type: dropdown
    id: facade
    attributes:
      label: Which facade?
      multiple: true
      options:
        - Blocking (`client.render()`, `client.documents()`)
        - Async (`client.renderAsync()`, `client.documentsAsync()`)
        - Not relevant
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: |
        Describe the actual behaviour. Include the stack trace if there is one, and the
        `code()` / `statusCode()` / `requestId()` from the `PoliPageException` if it applies.
    validations:
      required: true

  - type: textarea
    id: what-expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproducer
      description: |
        A self-contained Java snippet (10–30 lines) that we can paste into a test and run.
        Redact API keys.
      render: java
    validations:
      required: true

  - type: input
    id: request-id
    attributes:
      label: requestId (optional)
      description: |
        If the failure was a server-side error, the `requestId` from the exception lets us trace
        the request in our backend logs.
      placeholder: "req_…"
